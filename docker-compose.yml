services:
  nginx:
    image: nginx:alpine
    container_name: locvung_nginx
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
      - mysql
    networks:
      - locvung_network

  app:
    build:
      context: ./docker/app
      dockerfile: Dockerfile
    container_name: locvung_app
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
      - ./tmp:/tmp                     # <-- mount thêm
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=locvung_caycanh
      - DB_USERNAME=root
      - DB_PASSWORD=root_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mysql
      - redis
    networks:
      - locvung_network

  mysql:
    image: mysql:8.0
    container_name: locvung_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: locvung_caycanh
      MYSQL_USER: locvung_user
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    networks:
      - locvung_network

  redis:
    image: redis:alpine
    container_name: locvung_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - locvung_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: locvung_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 100M
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - locvung_network

networks:
  locvung_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local